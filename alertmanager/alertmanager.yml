global:
  resolve_timeout: 5m

route:
  group_by:
    - alertname
    - job
  group_wait: 20s
  group_interval: 2m
  repeat_interval: 2h
  receiver: webhook-relay

receivers:
  - name: webhook-relay
    webhook_configs:
      - url: http://alert-webhook:8080/alertmanager
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - instance

