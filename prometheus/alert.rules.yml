groups:
  - name: host.rules
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "实例 {{ $labels.instance }} 已离线"
          description: "监控任务 {{ $labels.job }} 的目标 {{ $labels.instance }} 已连续 1 分钟不可达。"

      - alert: HighCpuUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "实例 {{ $labels.instance }} CPU 使用率过高"
          description: "CPU 使用率已连续 5 分钟超过 85%。"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "实例 {{ $labels.instance }} 内存使用率过高"
          description: "内存使用率已连续 5 分钟超过 85%。"

      - alert: LowDiskSpace
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"})) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "实例 {{ $labels.instance }} 磁盘空间不足"
          description: "挂载点 {{ $labels.mountpoint }} 使用率已超过 85%。"

  - name: endpoint.rules
    rules:
      - alert: EndpointUnavailable
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "HTTP 探测目标 {{ $labels.instance }} 不可用"
          description: "Blackbox HTTP 探测已连续 2 分钟失败。"
