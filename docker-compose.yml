services:
  consul:
    image: hashicorp/consul:1.20
    container_name: monitoring-consul
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        exec consul agent \
          -server \
          -bootstrap-expect=1 \
          -ui \
          -client=0.0.0.0 \
          -datacenter="${CONSUL_DATACENTER:-dc1}" \
          -data-dir=/consul/data \
          $${CONSUL_ADVERTISE_ADDR:+-advertise="$${CONSUL_ADVERTISE_ADDR}"}
    environment:
      CONSUL_ADVERTISE_ADDR: ${CONSUL_ADVERTISE_ADDR:-}
    ports:
      - "8500:8500"
      - "8300:8300"
      - "8301:8301"
      - "8301:8301/udp"
      - "8600:8600"
      - "8600:8600/udp"
    volumes:
      - ${MONITORING_DATA_DIR:-/data/monitoring}/consul:/consul/data

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: monitoring-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - ${MONITORING_DATA_DIR:-/data/monitoring}/prometheus:/prometheus
    depends_on:
      - consul
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: monitoring-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.external-url=http://localhost:9093
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager:/etc/alertmanager:ro
      - ${MONITORING_DATA_DIR:-/data/monitoring}/alertmanager:/alertmanager

  grafana:
    image: grafana/grafana:11.2.0
    container_name: monitoring-grafana
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ${MONITORING_DATA_DIR:-/data/monitoring}/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: monitoring-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave

  consul-register-local-node:
    image: curlimages/curl:8.10.1
    container_name: monitoring-consul-register-local-node
    restart: on-failure
    depends_on:
      - consul
      - node-exporter
    command:
      - sh
      - -ec
      - |
        until curl -fsS http://consul:8500/v1/status/leader >/dev/null; do sleep 2; done
        curl -fsS -X PUT --data '{"ID":"node-exporter-local","Name":"node-exporter","Address":"node-exporter","Port":9100,"Tags":["local","docker"],"Meta":{"env":"local","hostname":"docker-host"},"Check":{"TCP":"node-exporter:9100","Interval":"15s","Timeout":"3s"}}' http://consul:8500/v1/agent/service/register

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: monitoring-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: monitoring-blackbox
    restart: unless-stopped
    volumes:
      - ./blackbox:/etc/blackbox_exporter:ro

  alert-webhook:
    build:
      context: ./webhook-relay
    container_name: monitoring-alert-webhook
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL:-}
      DINGTALK_SECRET: ${DINGTALK_SECRET:-}
      LARK_WEBHOOK_URL: ${LARK_WEBHOOK_URL:-}
      LARK_SECRET: ${LARK_SECRET:-}
      ALERT_TITLE_PREFIX: ${ALERT_TITLE_PREFIX:-监控告警}
    ports:
      - "8080:8080"
