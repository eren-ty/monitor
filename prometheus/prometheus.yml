global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: consul-node-exporter
    consul_sd_configs:
      - server: consul:8500
        services:
          - node-exporter
        refresh_interval: 30s
    relabel_configs:
      - source_labels:
          - __meta_consul_service
        target_label: service
      - source_labels:
          - __meta_consul_node
        target_label: consul_node
      - source_labels:
          - __meta_consul_service_metadata_hostname
        target_label: hostname
      - source_labels:
          - __meta_consul_service_metadata_env
        target_label: env
      - source_labels:
          - __meta_consul_tags
        target_label: consul_tags

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - https://example.com
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
